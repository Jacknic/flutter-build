name: Flutter Build

permissions:
  contents: write

on:
  # 允许手动触发工作流，支持指定仓库URL
  workflow_dispatch:
    inputs:
      repository_url:
        description: "Git repository URL"
        required: true
        type: string
      checkout_options:
        description: "checkout options (e.g., -b branch_name --depth=1)"
        required: false
        default: "--depth=1"
        type: string
      artifacts_pattern:
        description: "Artifacts pattern to upload"
        required: true
        default: "*.tar.gz,*.zip,build/app/outputs/flutter-apk/*.apk"
        type: string
      flutter_version_name:
        description: "Flutter version (auto-detect from pubspec.yaml)"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - 3.x
          - 2.x
          - 3.41.x
          - 3.38.x
          - 3.22.x
          - 3.19.x
          - 3.16.x
          - 3.13.x
          - 3.10.x
          - 3.7.x
          - 3.3.x
          - 2.10.x
          - 2.8.x
          - 2.5.x
          - 2.2.x
      flutter_channel_name:
        description: "Flutter channel"
        required: false
        default: "stable"
        type: choice
        options:
          - stable
          - beta
          - dev
          - master
          - any

# 并发策略
concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build
    # 运行环境，基于矩阵策略
    runs-on: ${{ matrix.os }}
    continue-on-error: true

    strategy:
      fail-fast: false
      matrix:
        # 镜像版本 https://github.com/actions/runner-images/tree/main/images
        type: [web, macos, windows, linux, android]
        include:
          - type: web
            os: ubuntu-24.04
            path: build
            output: web

          - type: macos
            os: macos-14
            path: build/macos/Build/Products/Release
            output: ''

          - type: windows
            os: windows-2022
            path: build\windows\x64\runner
            output: Release

          - type: linux
            os: ubuntu-24.04
            path: build/linux/x64/release
            output: bundle

          - type: android
            os: ubuntu-24.04
            path: build/app/outputs
            output: flutter-apk

    steps:
      # 检出指定仓库（支持自定义URL）
      - name: Checkout Repository
        shell: bash
        run: |
          git clone ${{ github.event.inputs.repository_url }} ${{ github.event.inputs.checkout_options }} .

      - name: Check Platform Support
        shell: bash
        run: |
          if [ ! -d "${{ matrix.type }}" ]; then
            echo "⚠️ Platform folder '${{ matrix.type }}' not found. Skipping build for ${{ matrix.type }}."
            echo "skip_build=true" >> $GITHUB_ENV
          else
            echo "skip_build=false" >> $GITHUB_ENV
          fi      
      # 检测JDK版本（仅Android平台需要）
      - name: Detect JDK Version
        id: detect-jdk
        if: ${{ env.skip_build != 'true'  && matrix.type == 'android' }}
        shell: bash
        run: |
          JDK_VERSION=11
          if [ -f "android/gradle/wrapper/gradle-wrapper.properties" ]; then
            GRADLE_VERSION=$(grep "distributionUrl" android/gradle/wrapper/gradle-wrapper.properties | grep -oE 'gradle-[0-9]+' | cut -d'-' -f2)
            case $GRADLE_VERSION in
              9|1[0-9]) JDK_VERSION=21 ;;
              8) JDK_VERSION=17 ;;
              7) JDK_VERSION=11 ;;
            esac
          fi
          echo "jdk_version=$JDK_VERSION" >> $GITHUB_OUTPUT

      # 设置JDK（仅Android平台需要）
      - name: Set up JDK
        if: ${{ env.skip_build != 'true' && matrix.type == 'android' }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ steps.detect-jdk.outputs.jdk_version }}
          distribution: "temurin"
          cache: gradle

      - name: Linux环境
        if: ${{ env.skip_build != 'true' && matrix.type == 'linux' }}
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev

      - name: FlutterAction
        if: ${{ env.skip_build != 'true' }}
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ github.event.inputs.flutter_channel_name || 'stable' }}
          flutter-version: ${{ github.event.inputs.flutter_version_name != 'auto' && github.event.inputs.flutter_version_name || '' }}
          flutter-version-file: ${{ github.event.inputs.flutter_version_name == 'auto' && 'pubspec.yaml' || '' }}
          cache: true

      - name: 下载依赖
        if: ${{ env.skip_build != 'true' }}
        run: |
          flutter --version
          flutter pub get

      - name: 获取版本号
        if: ${{ env.skip_build != 'true' }}
        shell: bash
        run: |
          echo "version=$(awk -F': ' '/version:/ {gsub("\\+", "-", $2); print $2}' pubspec.yaml)" >> "$GITHUB_ENV"
          echo "repo_name=$(echo '${{ github.event.inputs.repository_url }}' | sed -n 's|.*/\([^/]*\)|\1|p')" >> "$GITHUB_ENV"

      - name: 打印提取信息
        if: ${{ env.skip_build != 'true' }}
        run: |
          echo "version: ${{ env.version || 'unknown' }}"
          echo "repo_name: ${{ env.repo_name }}"

      - name: 打包应用
        if: ${{ env.skip_build != 'true' }}
        shell: bash
        run: |
          case "${{ matrix.type }}" in
            web)   flutter build web --release ;;
            macos) flutter build macos ;;
            windows) flutter build windows ;;
            linux)  flutter build linux ;;
            android) flutter build apk --split-per-abi ;;
          esac

      - name: 压缩产物
        if: ${{ env.skip_build != 'true' }}
        shell: bash
        run: |
          if [ "${{ matrix.type }}" = "windows" ]; then
            powershell -Command "Compress-Archive -Path '${{ matrix.path }}\\${{ matrix.output }}' -DestinationPath '${{ env.repo_name }}-${{ matrix.type }}.zip'"
          elif [ "${{ matrix.type }}" = "macos" ]; then
            cd ${{ matrix.path }}
            APP_NAME=$(ls -d *.app 2>/dev/null | head -1)
            if [ -n "$APP_NAME" ]; then
              tar -czvf "${{ github.workspace }}/${{ env.repo_name }}-${{ matrix.type }}.tar.gz" "$APP_NAME"
            else
              echo "Error: No .app bundle found"
              exit 1
            fi
          elif [ "${{ matrix.type }}" != "android" ]; then
            tar -czvf ${{ env.repo_name }}-${{ matrix.type }}.tar.gz -C ${{ matrix.path }} ${{ matrix.output }}
          fi

      # 生成版本信息
      - name: Generate Version Info
        id: version
        shell: bash
        run: |
          # 生成版本号
          COMMIT_HASH=$(git rev-parse --short HEAD)
          BRANCH_NAME=$(git rev-parse --abbrev-ref HEAD | sed 's/\//-/g')
          BUILD_DATE=$(date '+%Y%m%d-%H%M%S')
          BUILD_NUMBER=${GITHUB_RUN_NUMBER}

          VERSION_NAME="${BUILD_DATE}-${COMMIT_HASH}"
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "version_hash=$COMMIT_HASH" >> $GITHUB_OUTPUT
          echo "📦 版本名称: $VERSION_NAME"
          echo "📦 版本代码: $BUILD_NUMBER"
          echo "📦 版本哈希: $COMMIT_HASH"

      # 生成构建报告
      - name: Generate Build Report
        if: always()
        shell: bash
        run: |
          cat > build-report.md <<EOF
          # Flutter 构建报告 - ${{ matrix.type }}

          ## 📋 构建信息
          - **平台**: ${{ matrix.type }}
          - **JDK版本**: ${{ steps.detect-jdk.outputs.jdk_version || 'N/A' }}
          - **版本名称**: ${{ steps.version.outputs.version_name }}
          - **版本代码**: ${{ steps.version.outputs.version_code }}

          ## 📦 仓库信息
          - **仓库URL**: ${{ github.event.inputs.repository_url }}
          - **检出参数**: ${{ github.event.inputs.checkout_options }}
          - **提交**: ${{ steps.version.outputs.version_hash }}
          - **运行ID**: [${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          EOF
          cat build-report.md

      - name: ReleaseAction
        if: ${{ env.skip_build != 'true' }}
        uses: ncipollo/release-action@v1
        with:
          tag: "v${{ github.run_number }}_${{ env.version || 'dev' }}"
          draft: false
          artifacts: "${{ github.event.inputs.artifacts_pattern }}"
          makeLatest: "latest"
          allowUpdates: true
          bodyFile: build-report.md

